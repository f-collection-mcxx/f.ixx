name: Create Module Branches on Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  create-module-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Process Modules
        run: |
          if [ ! -d "modules" ]; then
            echo "modules directory not found."
            exit 0
          fi

          # 获取当前发布对应的 Commit ID
          TARGET_COMMIT=${{ github.event.release.target_commitish }}
          TAG_NAME=${{ github.event.release.tag_name }}

          # 遍历 modules 目录
          for dir in modules/*/; do
            folder_name=$(basename "$dir")
            branch_name="module-$folder_name"
          
            echo "------------------------------------------"
            echo "Processing: $folder_name"
          
            # 1. 将模块内容拷贝到临时目录（防止 git rm 删掉源文件）
            temp_dir=$(mktemp -d)
            cp -r "modules/$folder_name"/. "$temp_dir/"

            # 2. 处理分支
            if git show-ref --verify --quiet "refs/remotes/origin/$branch_name"; then
              echo "Updating existing branch: $branch_name"
              git checkout "$branch_name"
              git pull origin "$branch_name"
            else
              echo "Creating new orphan branch: $branch_name"
              git checkout --orphan "$branch_name"
            fi

            # 3. 清空当前分支内容并替换
            git rm -rf . > /dev/null 2>&1 || true
            cp -r "$temp_dir"/. .
          
            # 4. 提交并推送
            if [ -n "$(git status --porcelain)" ]; then
              git add -A
              git commit -m "Release $TAG_NAME: Update module $folder_name"
              git push origin "$branch_name"
            else
              echo "No changes for $folder_name, skipping push."
            fi

            # 5. 切回原始 Commit 以进行下一次循环
            git checkout -f $TARGET_COMMIT
            rm -rf "$temp_dir"
          done